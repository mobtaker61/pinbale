services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "3000:3000"
    # تصاویر روی هاست؛ بدون این mount کانتینر پوشهٔ خالی می‌بیند
    volumes:
      - ./images:/app/images

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./images:/app/images
