services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "3000:3000"
    # کل درخت images روی هاست (موضوعات، sent، کش اینستاگرام) → /app/images در هر دو سرویس
    volumes:
      - ./images:/app/images

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      # همان مسیر api تا worker و api هر دو به instagram-cache و sent دسترسی یکسان داشته باشند
      - ./images:/app/images
